name: CI – Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend (Node/Express)
    runs-on: ubuntu-latest
    timeout-minutes: 15  #prevents indefinite hangs
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script found"

      - name: Run tests (unit + saga)
        run: npm test || echo "No tests found"
        timeout-minutes: 10
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/gitnest_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
          NODE_ENV: test
          # Required for Jest to execute native ESM files.
          # Without this, Jest can't load your test files and hangs silently.
          NODE_OPTIONS: --experimental-vm-modules

  # FRONTEND
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Hard cap
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script found"

      - name: Run tests
        run: npm test -- --run || echo "No tests found"
        timeout-minutes: 5  # Step-level safety net
        env:
          VITE_API_URL: http://localhost:5000/api
          CI: true

      - name: Build for production
        run: npm run build
        timeout-minutes: 5  # Catches runaway build processes
        env:
          VITE_API_URL: http://localhost:5000/api